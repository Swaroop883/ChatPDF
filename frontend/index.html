<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatPDF — Sign In</title>
  <meta name="description" content="Sign in to ChatPDF to upload PDFs and have intelligent AI-powered conversations with your documents." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>



<main class="page-center">
  <div class="auth-wrapper">

    
    <div class="auth-header">
      <div class="brand">
        <div class="brand-icon">✦</div>
        ChatPDF
      </div>
      <p>Upload any PDF and have an intelligent conversation with it.</p>
    </div>

    
    <div class="card">

      
      <div class="auth-tabs" role="tablist">
        <button
          id="tab-login"
          class="auth-tab active"
          role="tab"
          aria-selected="true"
          aria-controls="login-form"
        >Sign In</button>
        <button
          id="tab-register"
          class="auth-tab"
          role="tab"
          aria-selected="false"
          aria-controls="register-form"
        >Create Account</button>
      </div>

      
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" id="login-submit" class="btn btn-primary btn-block btn-lg">
          Sign In
        </button>

      </form>

      
      <form id="register-form" style="display:none;" novalidate>

        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input
            type="text"
            id="reg-username"
            class="form-input"
            placeholder="Your display name"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input
            type="email"
            id="reg-email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input
            type="password"
            id="reg-password"
            class="form-input"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>

        <button type="submit" id="register-submit" class="btn btn-primary btn-block btn-lg">
          Create Account
        </button>

      </form>

     
      <div class="divider">or continue with</div>

      
      <button id="btn-google" class="btn btn-google">
        
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.6 0 6.4 1.6 8.4 3l6.2-6.2C34.7 3.1 29.7 1 24 1 15 1 7.3 6.3 3.6 13.8l7.2 5.6C12.7 13 17.9 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9.1h12.7c-.5 2.9-2.2 5.3-4.6 7l7.3 5.7c4.2-3.9 6.6-9.7 6.6-17.1z"/>
          <path fill="#FBBC05" d="M10.8 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6L3 13.8A23.9 23.9 0 0 0 .5 24c0 3.8.9 7.4 2.5 10.6l7.8-6z"/>
          <path fill="#34A853" d="M24 47c5.5 0 10.2-1.8 13.6-5l-7.3-5.7c-1.8 1.2-4.1 1.9-6.3 1.9-6 0-11.2-3.5-13.2-9.6l-7.8 6c3.7 7.5 11.4 12.4 21 12.4z"/>
        </svg>
        Continue with Google
      </button>

    </div>
  </div>
</main>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  
  initAuthPage();
</script>

</body>
</html>
